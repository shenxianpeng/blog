name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'content/**'
      - 'config/**'
      - 'layouts/**'
      - 'assets/**'
      - 'static/**'
      - 'i18n/**'
      - 'themes/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.154.5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build Hugo for preview
        run: |
          hugo --gc --minify --baseURL "https://shenxianpeng.github.io/preview/pr-${{ github.event.pull_request.number }}/"

      - name: Prepare preview directory
        run: |
          mkdir -p preview_deploy/preview/pr-${{ github.event.pull_request.number }}
          cp -r public/* preview_deploy/preview/pr-${{ github.event.pull_request.number }}/

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: shenxianpeng/shenxianpeng.github.io
          publish_branch: master
          publish_dir: ./preview_deploy
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Preview for PR #${{ github.event.pull_request.number }}"

      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '🚀 PR Preview deployed:'

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **PR Preview deployed:** [https://shenxianpeng.github.io/preview/pr-${{ github.event.pull_request.number }}/](https://shenxianpeng.github.io/preview/pr-${{ github.event.pull_request.number }}/)
          edit-mode: replace
