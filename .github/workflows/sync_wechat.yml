name: Sync Blog Post to WeChat

on:
  workflow_dispatch:
    inputs:
      post_path:
        description: |
          Path to the blog post to sync, e.g. content/posts/2026/weekly-5/index.md
          Leave empty to automatically use the latest Chinese post.
        required: false
        default: ''

jobs:
  sync-to-wechat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests markdown PyYAML

      - name: Resolve blog post path
        id: find_post
        run: |
          post_path="${{ github.event.inputs.post_path }}"

          if [ -n "$post_path" ]; then
            if [ ! -f "$post_path" ]; then
              echo "Specified file not found: $post_path"
              exit 1
            fi
            echo "Using specified post: $post_path"
          else
            # Find the latest Chinese post (index.md, skip index.en.md)
            latest_file=""
            latest_date=""
            while IFS= read -r -d '' file; do
              post_date=$(grep -m 1 '^date:' "$file" | sed 's/^date:[[:space:]]*//')
              if [ -n "$post_date" ]; then
                if [ -z "$latest_date" ] || [[ "$post_date" > "$latest_date" ]]; then
                  latest_date="$post_date"
                  latest_file="$file"
                fi
              fi
            done < <(find content/posts -type f -name 'index.md' -print0)

            if [ -z "$latest_file" ]; then
              echo "No post found. Exiting."
              exit 1
            fi

            post_path="$latest_file"
            echo "Latest post: $post_path (date: $latest_date)"
          fi

          echo "post_path=$post_path" >> "$GITHUB_OUTPUT"

      - name: Sync to WeChat as Draft
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          POST_PATH: ${{ steps.find_post.outputs.post_path }}
        run: python .github/scripts/sync_to_wechat.py
